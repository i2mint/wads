# Reusable NPM CI workflow (wads).
#
# Consumers call this from their own .github/workflows/npm-ci.yml stub:
#
#   jobs:
#     npm-ci:
#       uses: i2mint/wads/.github/workflows/npm-ci.yml@master
#       with:
#         package-dir: js
#       secrets:
#         NPM_TOKEN: ${{ secrets.NPM_TOKEN }}   # only needed as OIDC fallback
#
# Design (mirrors the Python uv-ci.yml SSOT model):
#   - ALL configuration lives in the consumer's <package-dir>/package.json under
#     the namespaced top-level "wads" key (wads.ci.*). npm ignores unknown keys.
#   - `validate` runs lint/test/build on every push/PR (matrix over node).
#   - `publish` is OPT-IN: it runs only when wads.ci.publish.enabled is true AND
#     the push is to the default branch AND the head commit message contains the
#     publish marker (default "[publish-npm]" — deliberately distinct from any
#     Python publish trigger).
#   - Publishing uses npm OIDC trusted publishing by default (no long-lived
#     token); NPM_TOKEN is a documented fallback for first-publish / private deps.
#   - A pre-publish "version already on registry?" guard makes the job
#     idempotent (no 403 on re-run); there is NO auto-bump on the JS side.

name: NPM CI

on:
  workflow_call:
    inputs:
      package-dir:
        description: "Directory containing package.json (relative to repo root)."
        type: string
        default: "js"
    secrets:
      NPM_TOKEN:
        description: "npm auth token. Optional; only used as an OIDC fallback."
        required: false

permissions:
  contents: read
  id-token: write # for npm provenance / OIDC trusted publishing

jobs:
  setup:
    name: Read wads.ci config from package.json
    runs-on: ubuntu-latest
    outputs:
      node_versions: ${{ steps.cfg.outputs.node_versions }}
      publish_node: ${{ steps.cfg.outputs.publish_node }}
      lint_command: ${{ steps.cfg.outputs.lint_command }}
      test_command: ${{ steps.cfg.outputs.test_command }}
      build_command: ${{ steps.cfg.outputs.build_command }}
      publish_enabled: ${{ steps.cfg.outputs.publish_enabled }}
      publish_marker: ${{ steps.cfg.outputs.publish_marker }}
      registry: ${{ steps.cfg.outputs.registry }}
      provenance: ${{ steps.cfg.outputs.provenance }}
      access: ${{ steps.cfg.outputs.access }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse package.json wads.ci
        id: cfg
        working-directory: ${{ inputs.package-dir }}
        run: |
          read_cfg() {
            node -e "
              const p = require('./package.json');
              const ci = (p.wads && p.wads.ci) || {};
              const pub = ci.publish || {};
              const out = {
                node_versions: JSON.stringify(ci.nodeVersions || ['20','22','24']),
                publish_node: String(ci.publishNode || '24'),
                lint_command: ci.lintCommand || 'npm run lint --if-present',
                test_command: ci.testCommand || 'npm test --if-present',
                build_command: ci.buildCommand || 'npm run build --if-present',
                publish_enabled: String(pub.enabled === true),
                publish_marker: pub.marker || '[publish-npm]',
                registry: pub.registry || 'https://registry.npmjs.org',
                provenance: String(pub.provenance !== false),
                access: pub.access || 'public',
              };
              for (const [k,v] of Object.entries(out)) console.log(k+'='+v);
            "
          }
          read_cfg >> "$GITHUB_OUTPUT"

  validate:
    name: Validate (node ${{ matrix.node }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(needs.setup.outputs.node_versions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: ${{ inputs.package-dir }}/package-lock.json
      - name: Install
        working-directory: ${{ inputs.package-dir }}
        run: npm ci || npm install
      - name: Lint
        working-directory: ${{ inputs.package-dir }}
        run: ${{ needs.setup.outputs.lint_command }}
      - name: Test
        working-directory: ${{ inputs.package-dir }}
        run: ${{ needs.setup.outputs.test_command }}
      - name: Build
        working-directory: ${{ inputs.package-dir }}
        run: ${{ needs.setup.outputs.build_command }}

  publish:
    name: Publish to npm
    needs: [setup, validate]
    runs-on: ubuntu-latest
    # Opt-in: enabled in package.json AND push to default branch AND marker present.
    if: >-
      needs.setup.outputs.publish_enabled == 'true' &&
      github.event_name == 'push' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      contains(github.event.head_commit.message, needs.setup.outputs.publish_marker)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.setup.outputs.publish_node }}
          registry-url: ${{ needs.setup.outputs.registry }}
      - name: Install
        working-directory: ${{ inputs.package-dir }}
        run: npm ci || npm install
      - name: Build
        working-directory: ${{ inputs.package-dir }}
        run: ${{ needs.setup.outputs.build_command }}
      - name: Check version not already published
        id: check
        working-directory: ${{ inputs.package-dir }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "Version $NAME@$VER already published; skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.check.outputs.exists == 'false'
        working-directory: ${{ inputs.package-dir }}
        run: |
          PROV=""
          if [ "${{ needs.setup.outputs.provenance }}" = "true" ]; then
            PROV="--provenance"
          fi
          npm publish $PROV --access ${{ needs.setup.outputs.access }}
        env:
          # Omitted/empty under OIDC trusted publishing; used only as a fallback.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
