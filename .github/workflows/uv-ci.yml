name: Continuous Integration (uv, reusable)
# Reusable wads CI workflow. Consuming repos call this via a small stub at
# .github/workflows/ci.yml — see wads/data/github_ci_uv_stub.yml.
#
# All configuration comes from the caller's pyproject.toml [tool.wads.ci.*]
# section, read by the setup job below.
#
# SECRETS — two layers (see wads/ci_secrets.py for the full rationale):
#   1. Transport: the caller stub explicitly passes named secrets (cross-owner
#      `secrets: inherit` is unreliable, so we never rely on it). The
#      `on.workflow_call.secrets` block below is the *superset* of names a
#      stub may pass — the universe of allowed secret names. It is generated
#      from wads.ci_secrets.DEFAULT_CI_SECRETS and pinned by a wads test.
#   2. Env-assignment: which of those secrets actually become job environment
#      variables (and which are required) is driven entirely by the caller's
#      [tool.wads.ci.env], applied by the `export-ci-env` action below. A
#      passed-but-unconfigured secret is never written to the environment.
#
# To use a secret whose name is NOT in the superset below: either add it here
# via a PR to wads (one line, benefits everyone) or inline the full workflow
# (escape valve) by replacing the stub with a copy of wads/data/github_ci_uv.yml.

on:
  workflow_call:
    inputs:
      # Most consumers don't need to override anything — pyproject.toml drives
      # the workflow. These inputs exist for the rare cases where the project
      # name differs from the repo name.
      project-name:
        description: "Project / package name. Defaults to the repo name."
        type: string
        required: false
        default: ""

    # ─── SECRET SUPERSET (generated from wads.ci_secrets.DEFAULT_CI_SECRETS) ───
    # Every entry is `required: false`; the caller stub passes only the subset
    # its pyproject declares. Run-time enforcement of required secrets happens
    # in the export-ci-env step (and PYPI_PASSWORD in the publish job).
    # Edit wads/ci_secrets.py, not this block by hand — a test pins them equal.
    secrets:
      PYPI_PASSWORD:
        required: false
      TEST_PYPI_PASSWORD:
        required: false
      NPM_TOKEN:
        required: false
      SSH_PRIVATE_KEY:
        required: false
      CODECOV_TOKEN:
        required: false
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      OPENAI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      GOOGLE_API_KEY:
        required: false
      DEEPSEEK_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false
      GROQ_API_KEY:
        required: false
      MISTRAL_API_KEY:
        required: false
      COHERE_API_KEY:
        required: false
      PERPLEXITY_API_KEY:
        required: false
      REPLICATE_API_TOKEN:
        required: false
      TOGETHER_API_KEY:
        required: false
      XAI_API_KEY:
        required: false
      FAL_KEY:
        required: false
      AZURE_OPENAI_API_KEY:
        required: false
      AZURE_OPENAI_ENDPOINT:
        required: false
      TAVILY_API_KEY:
        required: false
      COMPOSIO_API_KEY:
        required: false
      SKILLSDIRECTORY_API_KEY:
        required: false
      NEWSDATA_API_KEY:
        required: false
      LANGSMITH_API_KEY:
        required: false
      HF_TOKEN:
        required: false
      HF_WRITE_TOKEN:
        required: false
      HUGGINGFACE_TOKEN:
        required: false
      KAGGLE_USERNAME:
        required: false
      KAGGLE_KEY:
        required: false
      WANDB_API_KEY:
        required: false
      PINECONE_API_KEY:
        required: false
      ELEVEN_API_KEY:
        required: false
      ELEVENLABS_API_KEY:
        required: false
      SUNO_API_KEY:
        required: false
      SPOTIFY_API_CLIENT_ID:
        required: false
      SPOTIFY_API_CLIENT_SECRET:
        required: false
      SPOTIPY_CLIENT_ID:
        required: false
      SPOTIPY_CLIENT_SECRET:
        required: false
      ALPACA_API_KEY:
        required: false
      ALPACA_SECRET_KEY:
        required: false
      APCA_API_KEY_ID:
        required: false
      APCA_API_SECRET_KEY:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      AWS_SESSION_TOKEN:
        required: false
      GCP_SA_KEY:
        required: false
      GOOGLE_APPLICATION_CREDENTIALS_JSON:
        required: false
      SLACK_BOT_TOKEN:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TWILIO_ACCOUNT_SID:
        required: false
      TWILIO_AUTH_TOKEN:
        required: false
      SENDGRID_API_KEY:
        required: false
      STRIPE_SECRET_KEY:
        required: false
      DATABASE_URL:
        required: false
      MONGODB_URI:
        required: false
      REDIS_URL:
        required: false

env:
  # Project identification. Most repos: package name == repo name; this just
  # resolves to github.event.repository.name. Override with `with.project-name`
  # in the caller stub when they differ.
  #
  # NOTE: secret-backed env vars are intentionally NOT set here. They are
  # written to $GITHUB_ENV per-job by the export-ci-env step, driven by the
  # caller's [tool.wads.ci.env] — so each repo gets exactly the env it declares.
  PROJECT_NAME: ${{ inputs.project-name != '' && inputs.project-name || github.event.repository.name }}

jobs:
  # First job: Read configuration from pyproject.toml
  setup:
    name: Read Configuration
    runs-on: ubuntu-latest
    outputs:
      project-name: ${{ steps.config.outputs.project-name }}
      python-versions: ${{ steps.config.outputs.python-versions }}
      pytest-args: ${{ steps.config.outputs.pytest-args }}
      coverage-enabled: ${{ steps.config.outputs.coverage-enabled }}
      exclude-paths: ${{ steps.config.outputs.exclude-paths }}
      test-on-windows: ${{ steps.config.outputs.test-on-windows }}
      tests-enabled: ${{ steps.config.outputs.tests-enabled }}
      build-sdist: ${{ steps.config.outputs.build-sdist }}
      build-wheel: ${{ steps.config.outputs.build-wheel }}
      install-extras: ${{ steps.config.outputs.install-extras }}
      metrics-enabled: ${{ steps.config.outputs.metrics-enabled }}
      metrics-config-path: ${{ steps.config.outputs.metrics-config-path }}
      metrics-storage-branch: ${{ steps.config.outputs.metrics-storage-branch }}
      metrics-python-version: ${{ steps.config.outputs.metrics-python-version }}
      metrics-force-run: ${{ steps.config.outputs.metrics-force-run }}
      ruff-enabled: ${{ steps.config.outputs.ruff-enabled }}
      black-enabled: ${{ steps.config.outputs.black-enabled }}
      mypy-enabled: ${{ steps.config.outputs.mypy-enabled }}
      docs-enabled: ${{ steps.config.outputs.docs-enabled }}
      publish-enabled: ${{ steps.config.outputs.publish-enabled }}
      skip-ci-marker: ${{ steps.config.outputs.skip-ci-marker }}
      publish-marker: ${{ steps.config.outputs.publish-marker }}
      env-required: ${{ steps.config.outputs.env-required }}
      env-test: ${{ steps.config.outputs.env-test }}
      env-extra: ${{ steps.config.outputs.env-extra }}
      env-defaults: ${{ steps.config.outputs.env-defaults }}
      env-aliases: ${{ steps.config.outputs.env-aliases }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Read CI Config
        id: config
        uses: i2mint/wads/actions/read-ci-config@master
        with:
          pyproject-path: .

  # Second job: Validation using the config
  validation:
    name: Validation
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: i2mint/wads/actions/setup-python-uv@master
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install System Dependencies
        uses: i2mint/wads/actions/install-system-deps@master
        with:
          pyproject-path: .

      - name: Install Dependencies
        uses: i2mint/wads/actions/install-deps-uv@master
        with:
          extras: ${{ needs.setup.outputs.install-extras }}

      # Write the pyproject-declared env vars into $GITHUB_ENV (and fail fast
      # if a required secret is missing). Driven by [tool.wads.ci.env].
      - name: Export CI Environment
        uses: i2mint/wads/actions/export-ci-env@master
        with:
          required: ${{ needs.setup.outputs.env-required }}
          test: ${{ needs.setup.outputs.env-test }}
          extra: ${{ needs.setup.outputs.env-extra }}
          defaults: ${{ needs.setup.outputs.env-defaults }}
          aliases: ${{ needs.setup.outputs.env-aliases }}
          secrets-json: ${{ toJSON(secrets) }}

      - name: Format Source Code
        if: needs.setup.outputs.ruff-enabled != 'false'
        run: uvx ruff format .

      - name: Format Source Code (black)
        if: needs.setup.outputs.black-enabled == 'true'
        run: uvx black .

      - name: Lint Validation
        if: needs.setup.outputs.ruff-enabled != 'false'
        run: uvx ruff check --output-format=github ${{ needs.setup.outputs.project-name }}

      - name: Type Check (mypy)
        if: needs.setup.outputs.mypy-enabled == 'true'
        run: uvx mypy ${{ needs.setup.outputs.project-name }}

      - name: Run Tests
        if: needs.setup.outputs.tests-enabled != 'false'
        uses: i2mint/wads/actions/run-tests-uv@master
        with:
          root-dir: ${{ needs.setup.outputs.project-name }}
          pytest-args: ${{ needs.setup.outputs.pytest-args }}
          exclude-paths: ${{ needs.setup.outputs.exclude-paths }}
          coverage: ${{ needs.setup.outputs.coverage-enabled }}

      - name: Track Code Metrics
        if: needs.setup.outputs.metrics-enabled == 'true'
        uses: i2mint/umpyre/actions/track-metrics@master
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: ${{ needs.setup.outputs.metrics-config-path }}
          storage-branch: ${{ needs.setup.outputs.metrics-storage-branch }}
          python-version: ${{ needs.setup.outputs.metrics-python-version }}
          force-run: ${{ needs.setup.outputs.metrics-force-run }}

  # Optional Windows testing (if enabled in config)
  windows-validation:
    name: Windows Tests
    if: "!contains(github.event.head_commit.message, '[skip ci]') && needs.setup.outputs.test-on-windows == 'true' && needs.setup.outputs.tests-enabled != 'false'"
    needs: setup
    runs-on: windows-latest
    continue-on-error: true
    env:
      # PEP 540 UTF-8 mode: avoid cp1252 UnicodeDecode/EncodeError when test
      # code reads source files or scripts print non-ASCII characters.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: i2mint/wads/actions/setup-python-uv@master
        with:
          python-version: ${{ fromJson(needs.setup.outputs.python-versions)[0] }}

      - name: Install System Dependencies
        uses: i2mint/wads/actions/install-system-deps@master
        with:
          pyproject-path: .

      - name: Install Dependencies
        uses: i2mint/wads/actions/install-deps-uv@master
        with:
          extras: ${{ needs.setup.outputs.install-extras }}

      - name: Export CI Environment
        uses: i2mint/wads/actions/export-ci-env@master
        with:
          required: ${{ needs.setup.outputs.env-required }}
          test: ${{ needs.setup.outputs.env-test }}
          extra: ${{ needs.setup.outputs.env-extra }}
          defaults: ${{ needs.setup.outputs.env-defaults }}
          aliases: ${{ needs.setup.outputs.env-aliases }}
          secrets-json: ${{ toJSON(secrets) }}

      - name: Run Tests
        uses: i2mint/wads/actions/run-tests-uv@master
        with:
          root-dir: ${{ needs.setup.outputs.project-name }}
          pytest-args: ${{ needs.setup.outputs.pytest-args }}
          exclude-paths: ${{ needs.setup.outputs.exclude-paths }}

  # Publishing job
  #
  # Gated by [tool.wads.ci.publish] in pyproject.toml (read via the setup job):
  #   - skip-ci-marker  : when publishing is enabled, a commit message containing
  #                       this substring skips the publish job (default "[skip ci]").
  #   - publish-enabled : whether publishing runs at all (default true).
  #   - publish-marker  : when publishing is disabled, a commit message containing
  #                       this substring forces the publish job (default "[publish]").
  # The publish-enabled check uses `== 'true'` (fail-closed): if an older wads
  # without these outputs is installed by read-ci-config, publishing is skipped
  # rather than run unintentionally.
  #
  # Per repo policy, test failures do NOT block publication. The `if:` uses
  # `!cancelled() && needs.setup.result == 'success'` so this job runs even
  # when `validation` fails, while still requiring `setup` to have succeeded
  # (publish consumes its outputs) and respecting workflow cancellation.
  publish:
    name: Publish
    permissions:
      contents: write
    if: "!cancelled() && needs.setup.result == 'success' && !contains(github.event.head_commit.message, needs.setup.outputs.skip-ci-marker) && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && (needs.setup.outputs.publish-enabled == 'true' || contains(github.event.head_commit.message, needs.setup.outputs.publish-marker))"
    needs: [setup, validation]
    runs-on: ubuntu-latest

    steps:
      # `actions/checkout@v6` defaults to persist-credentials: true, configuring
      # HTTPS auth in .git/config using `secrets.GITHUB_TOKEN`. Together with the
      # job-level `permissions: contents: write`, this is exactly what the
      # post-publish push-back needs — no per-repo SSH deploy key required.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: i2mint/wads/actions/setup-python-uv@master
        with:
          python-version: ${{ fromJson(needs.setup.outputs.python-versions)[0] }}
          create-venv: "false"

      - name: Format Source Code
        if: needs.setup.outputs.ruff-enabled != 'false'
        run: uvx ruff format .

      - name: Format Source Code (black)
        if: needs.setup.outputs.black-enabled == 'true'
        run: uvx black .

      - name: Update Version Number
        id: version
        uses: i2mint/isee/actions/bump-version-number@master

      - name: Build Distribution
        uses: i2mint/wads/actions/build-dist-uv@master
        with:
          sdist: ${{ needs.setup.outputs.build-sdist }}
          wheel: ${{ needs.setup.outputs.build-wheel }}

      - name: Publish to PyPI
        uses: i2mint/wads/actions/pypi-publish-uv@master
        with:
          pypi-token: ${{ secrets.PYPI_PASSWORD }}

      - name: Commit Changes
        uses: i2mint/wads/actions/git-commit@master
        with:
          commit-message: "**CI** Formatted code + Updated version to ${{ env.VERSION }} [skip ci]"
          push: true

      - name: Tag Repository
        uses: i2mint/wads/actions/git-tag@master
        with:
          tag: ${{ env.VERSION }}
          message: "Release version ${{ env.VERSION }}"
          push: true

  # Optional GitHub Pages (skipped when [tool.wads.ci.docs].enabled = false)
  # Depends on validation (not publish) so docs still publish when the publish
  # job is disabled via [tool.wads.ci.publish].enabled = false.
  #
  # Permissions: the underlying epythet/publish-github-pages action does NOT
  # use OIDC — it pushes to the gh-pages branch via peaceiris/actions-gh-pages
  # (needs `contents: write`) and configures Pages via the REST API
  # `/repos/{owner}/{repo}/pages` (needs `pages: write`). `id-token: write`
  # would be required only for the official `actions/deploy-pages` OIDC flow,
  # which this action doesn't use. Dropping it removes a permission that
  # personal-account callers don't get by default — eliminating the
  # parse-time validation trap that bit the initial stub rollout.
  github-pages:
    name: Publish GitHub Pages
    permissions:
      contents: write
      pages: write
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && needs.setup.outputs.docs-enabled != 'false'"
    needs: [setup, validation]
    runs-on: ubuntu-latest

    steps:
      - uses: i2mint/epythet/actions/publish-github-pages@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ignore: "tests/,scrap/,examples/"
