name: "Run Tests (uv)"
description: "Run pytest tests with doctests using uv virtual environment"

inputs:
  root-dir:
    description: "Project root directory (used for --cov target and as default test path)"
    required: false
    default: "."
  pytest-args:
    description: "Additional arguments to pass to pytest"
    required: false
    default: ""
  exclude-paths:
    description: "Comma-separated paths to exclude (e.g., 'examples,scrap')"
    required: false
    default: ""
  coverage:
    description: "Enable coverage reporting"
    required: false
    default: "false"

runs:
  using: 'composite'
  steps:
    - name: Install pytest
      shell: bash
      run: |
        # Activate venv (cross-platform)
        if [ -f ".venv/bin/activate" ]; then
          source .venv/bin/activate
        elif [ -f ".venv/Scripts/activate" ]; then
          source .venv/Scripts/activate
        fi
        # Install pytest unconditionally; install pytest-cov only when coverage
        # is enabled. Previously pytest came in only as a transitive of
        # pytest-cov, which left Windows jobs (coverage off) without pytest.
        if [ "${{ inputs.coverage }}" = "true" ]; then
          uv pip install pytest pytest-cov
        else
          uv pip install pytest
        fi

    - name: Run Tests
      shell: bash
      run: |
        set -e
        # Activate venv (cross-platform)
        if [ -f ".venv/bin/activate" ]; then
          source .venv/bin/activate
        elif [ -f ".venv/Scripts/activate" ]; then
          source .venv/Scripts/activate
        fi

        # Resolve the venv's python explicitly. Relying on $PATH alone is
        # fragile: on Windows, `python3` is provided system-wide by
        # actions/setup-python, so `command -v python3` finds *that* even
        # after activating a .venv whose Scripts/ exposes only `python`.
        # Use the activate script's $VIRTUAL_ENV to pick the right binary.
        if [ -n "${VIRTUAL_ENV:-}" ]; then
          if [ -x "$VIRTUAL_ENV/bin/python" ]; then
            PY="$VIRTUAL_ENV/bin/python"
          elif [ -x "$VIRTUAL_ENV/Scripts/python.exe" ]; then
            PY="$VIRTUAL_ENV/Scripts/python.exe"
          else
            PY="python3"
          fi
        else
          # No venv (shouldn't happen post-activate, but be safe)
          PY="python3"
        fi
        CMD="$PY -m pytest"

        # Add coverage flags
        if [ "${{ inputs.coverage }}" = "true" ]; then
          CMD="$CMD --cov=${{ inputs.root-dir }} --cov-report=term-missing"
        fi

        # Add doctest flags
        CMD="$CMD --doctest-modules"
        CMD="$CMD -o doctest_optionflags='ELLIPSIS IGNORE_EXCEPTION_DETAIL'"

        # Add exclude paths
        EXCLUDE="${{ inputs.exclude-paths }}"
        if [ -n "$EXCLUDE" ]; then
          IFS=',' read -ra PATHS <<< "$EXCLUDE"
          for path in "${PATHS[@]}"; do
            path=$(echo "$path" | xargs)
            if [ -n "$path" ]; then
              CMD="$CMD --ignore=$path"
            fi
          done
        fi

        # Add extra pytest args
        PYTEST_ARGS="${{ inputs.pytest-args }}"
        if [ -n "$PYTEST_ARGS" ]; then
          CMD="$CMD $PYTEST_ARGS"
        fi

        echo "Running: $CMD"
        eval $CMD
