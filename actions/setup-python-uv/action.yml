name: "Set up Python (uv)"
description: "Install a Python version via uv and create a virtual environment"

inputs:
  python-version:
    description: "Python version to install"
    required: true
  create-venv:
    description: "Create a virtual environment after installing Python"
    required: false
    default: "true"

runs:
  using: 'composite'
  steps:
    - name: Install Python
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Create Virtual Environment
      if: ${{ inputs.create-venv == 'true' }}
      shell: bash
      run: uv venv --python ${{ inputs.python-version }}
